<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FF8200" />
    <meta name="description" content="Tristar Physical Therapy Reimbursement Calculator" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Tristar PT Calc" />
    <link rel="manifest" href="/tristar-reimb-app/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/tristar-reimb-app/icon.svg" />
    <link rel="apple-touch-icon" href="/tristar-reimb-app/icon.svg" />
    <title>Tristar PT — Reimbursement Calculator</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
      .app-loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; gap: 16px; }
      .app-loading-spinner { width: 40px; height: 40px; border: 3px solid #eee; border-top-color: #FF8200; border-radius: 50%; animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-loading">
        <div class="app-loading-spinner"></div>
        <div style="color:#888;font-size:14px;">Loading Tristar PT Calculator…</div>
      </div>
    </div>
    <script type="module" src="./src/index.jsx"></script>
  </body>
</html>
